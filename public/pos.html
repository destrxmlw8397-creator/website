<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সুপারশপ POS - প্রো সংস্করণ</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 15px;
        }

        /* Main Container */
        .pos-container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            height: calc(100vh - 30px);
        }

        /* Products Panel (Left Side) */
        .products-panel {
            background: #f8fafc;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            border-right: 2px solid #e2e8f0;
        }

        /* Search Box */
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        .search-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1.2rem;
            z-index: 10;
        }

        .search-box input {
            padding-left: 50px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            height: 55px;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
            outline: none;
        }

        .search-box input.scanner-active {
            border-color: #10b981;
            animation: scannerPulse 1.5s infinite;
        }

        @keyframes scannerPulse {
            0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16,185,129,0); }
            100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
        }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: 20px;
            scrollbar-width: thin;
        }

        .category-tab {
            padding: 10px 25px;
            border-radius: 40px;
            background: white;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
            color: #334155;
            transition: all 0.3s;
        }

        .category-tab:hover {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
            transform: translateY(-2px);
        }

        .category-tab.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        /* Product Card */
        .product-card {
            background: white;
            border-radius: 20px;
            padding: 20px 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: #3b82f6;
            box-shadow: 0 15px 30px rgba(59,130,246,0.15);
        }

        .product-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .stock-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .stock-high { background: #10b981; color: white; }
        .stock-medium { background: #f59e0b; color: white; }
        .stock-low { background: #ef4444; color: white; }

        /* Cart Panel (Right Side) */
        .cart-panel {
            background: white;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .cart-header {
            padding-bottom: 20px;
            border-bottom: 2px solid #3b82f6;
        }

        .cart-header input {
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            padding: 12px 15px;
            margin-bottom: 10px;
            width: 100%;
        }

        .cart-header input:focus {
            border-color: #3b82f6;
            outline: none;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 15px 0;
        }

        .cart-item {
            background: #f8fafc;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
            border-left: 4px solid #3b82f6;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .cart-item .btn-group .btn {
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        /* Held Carts Section */
        .held-carts-section {
            border-top: 2px dashed #3b82f6;
            padding-top: 15px;
            margin: 15px 0;
        }

        .held-carts-section .btn-info {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
        }

        .held-carts-section .btn-info:hover {
            background: #2563eb;
        }

        #heldCartsList {
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: #f8fafc;
            border-radius: 12px;
        }

        .held-cart-item {
            background: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            border-left: 3px solid #3b82f6;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .held-cart-item .btn-group {
            opacity: 0.7;
        }

        .held-cart-item:hover .btn-group {
            opacity: 1;
        }

        /* Cart Footer */
        .cart-footer {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 15px;
        }

        .payment-methods {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .payment-method {
            flex: 1;
            padding: 12px;
            border: 2px solid #475569;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            transition: all 0.3s;
            color: white;
        }

        .payment-method:hover {
            background: #3b82f6;
            border-color: #3b82f6;
        }

        .payment-method.active {
            background: #3b82f6;
            border-color: #3b82f6;
        }

        .calculator {
            background: #1e293b;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
        }

        .calc-display {
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            text-align: right;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #10b981;
        }

        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .calc-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #334155;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .calc-btn:hover {
            background: #3b82f6;
            transform: scale(0.95);
        }

        /* Toast Notification */
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 9999;
            animation: slideInRight 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .toast-success { background: #10b981; }
        .toast-error { background: #ef4444; }
        .toast-warning { background: #f59e0b; }
        .toast-info { background: #3b82f6; }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Customer History Panel */
        .customer-history {
            position: fixed;
            right: -450px;
            top: 0;
            width: 450px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 30px rgba(0,0,0,0.2);
            transition: right 0.3s ease;
            z-index: 1000;
            padding: 25px;
            overflow-y: auto;
        }

        .customer-history.open {
            right: 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .pos-container {
                height: auto;
            }
            
            .products-panel {
                height: 50vh;
            }
            
            .cart-panel {
                height: auto;
            }
        }
    </style>
</head>
<body>

<div class="pos-container">
    <div class="row g-0 h-100">
        <!-- Products Panel (Left) -->
        <div class="col-md-7 products-panel">
            <!-- Search Box -->
            <div class="search-box">
                <i class="bi bi-search"></i>
                <input type="text" id="search" placeholder="বারকোড স্ক্যান করুন অথবা নাম লিখুন..." autofocus>
            </div>

            <!-- Category Tabs -->
            <div class="category-tabs" id="categoryTabs">
                <div class="category-tab active" onclick="filterCategory('')">🏠 সব পণ্য</div>
                <!-- Dynamic categories will be added here -->
            </div>

            <!-- Quick Action Buttons -->
            <div class="row g-2 mb-4">
                <div class="col-4">
                    <button class="btn btn-danger w-100 py-3" onclick="clearCart()">
                        <i class="bi bi-trash3"></i> খালি
                    </button>
                </div>
                <div class="col-4">
                    <button class="btn btn-warning w-100 py-3" onclick="applyDiscount()">
                        <i class="bi bi-percent"></i> ডিসকাউন্ট
                    </button>
                </div>
                <div class="col-4">
                    <button class="btn btn-primary w-100 py-3" onclick="holdCart()">
                        <i class="bi bi-pause-circle"></i> হোল্ড
                    </button>
                </div>
            </div>

            <!-- Products Grid -->
            <div class="row g-3" id="productList">
                <!-- Products will be loaded here -->
            </div>
        </div>

        <!-- Cart Panel (Right) -->
        <div class="col-md-5 cart-panel">
            <!-- Cart Header -->
            <div class="cart-header">
                <h4 class="mb-3">
                    <i class="bi bi-cart-check text-primary"></i> 
                    শপিং কার্ট 
                    <span class="badge bg-primary rounded-pill" id="cartCount">0</span>
                </h4>
                
                <input type="text" id="customerName" placeholder="👤 কাস্টমারের নাম">
                <input type="text" id="customerMobile" placeholder="📞 মোবাইল নম্বর">
                <input type="text" id="customerAddress" placeholder="🏠 ঠিকানা">
            </div>

            <!-- Cart Items -->
            <div class="cart-items" id="cartItems">
                <!-- Cart items will be loaded here -->
            </div>

            <!-- Held Carts Section -->
            <div class="held-carts-section">
                <button class="btn btn-info w-100" type="button" data-bs-toggle="collapse" data-bs-target="#heldCartsPanel">
                    <i class="bi bi-pause-circle"></i> 
                    হোল্ড করা কার্ট (<span id="heldCartCount">0</span>)
                </button>
                
                <div class="collapse mt-2" id="heldCartsPanel">
                    <div id="heldCartsList">
                        <p class="text-muted text-center p-3">কোনো কার্ট হোল্ড করা নেই</p>
                    </div>
                </div>
            </div>

            <!-- Cart Footer -->
            <div class="cart-footer">
                <!-- Subtotal -->
                <div class="d-flex justify-content-between mb-2">
                    <span>সাবটোটাল:</span>
                    <span class="fs-5 fw-bold" id="subtotal">0</span>
                </div>

                <!-- Discount Row -->
                <div class="d-flex justify-content-between mb-2 text-warning" id="discountRow" style="display: none;">
                    <span>ডিসকাউন্ট:</span>
                    <span class="fs-5" id="discountAmount">0</span>
                </div>

                <!-- Total -->
                <div class="d-flex justify-content-between mb-3">
                    <span class="fs-4">মোট:</span>
                    <span class="fs-2 fw-bold" id="total">0</span>
                </div>

                <!-- Payment Methods -->
                <div class="payment-methods">
                    <div class="payment-method active" onclick="setPaymentMethod('cash')">
                        <i class="bi bi-cash"></i> নগদ
                    </div>
                    <div class="payment-method" onclick="setPaymentMethod('bkash')">
                        <i class="bi bi-phone"></i> বিকাশ
                    </div>
                    <div class="payment-method" onclick="setPaymentMethod('card')">
                        <i class="bi bi-credit-card"></i> কার্ড
                    </div>
                </div>

                <!-- Payment Fields -->
                <div id="bkashFields" style="display: none;">
                    <input type="text" class="form-control mb-2" placeholder="📱 বিকাশ নম্বর">
                    <input type="text" class="form-control mb-2" placeholder="🔢 ট্রানজেকশন আইডি">
                </div>

                <div id="cardFields" style="display: none;">
                    <input type="text" class="form-control mb-2" placeholder="💳 কার্ড নম্বর">
                    <input type="text" class="form-control mb-2" placeholder="👤 কার্ডের নাম">
                </div>

                <!-- Calculator -->
                <div class="calculator" id="calculator">
                    <div class="calc-display" id="calcDisplay">0</div>
                    <div class="calc-buttons">
                        <button class="calc-btn" onclick="calcInput('7')">7</button>
                        <button class="calc-btn" onclick="calcInput('8')">8</button>
                        <button class="calc-btn" onclick="calcInput('9')">9</button>
                        <button class="calc-btn" onclick="calcInput('+')">+</button>
                        <button class="calc-btn" onclick="calcInput('4')">4</button>
                        <button class="calc-btn" onclick="calcInput('5')">5</button>
                        <button class="calc-btn" onclick="calcInput('6')">6</button>
                        <button class="calc-btn" onclick="calcInput('-')">-</button>
                        <button class="calc-btn" onclick="calcInput('1')">1</button>
                        <button class="calc-btn" onclick="calcInput('2')">2</button>
                        <button class="calc-btn" onclick="calcInput('3')">3</button>
                        <button class="calc-btn" onclick="calcInput('*')">×</button>
                        <button class="calc-btn" onclick="calcInput('C')">C</button>
                        <button class="calc-btn" onclick="calcInput('0')">0</button>
                        <button class="calc-btn" onclick="calcInput('=')">=</button>
                        <button class="calc-btn" onclick="calcInput('/')">÷</button>
                    </div>
                </div>

                <!-- Paid Amount -->
                <div class="row g-2 mt-3">
                    <div class="col-6">
                        <input type="number" id="paidAmount" class="form-control form-control-lg" 
                               placeholder="💰 পরিশোধ" onkeyup="calculateChange()">
                    </div>
                    <div class="col-6">
                        <input type="text" id="changeAmount" class="form-control form-control-lg bg-light" 
                               placeholder="💵 বাকি" readonly>
                    </div>
                </div>

                <!-- Payment Button -->
                <button class="btn btn-success w-100 mt-3 py-3 fw-bold fs-5" onclick="processPayment()">
                    <i class="bi bi-printer"></i> পেমেন্ট ও প্রিন্ট
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Customer History Panel -->
<div class="customer-history" id="customerHistory">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4><i class="bi bi-clock-history text-primary"></i> ক্রয় ইতিহাস</h4>
        <button class="btn btn-sm btn-danger" onclick="closeHistory()">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>
    <div id="historyContent"></div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ==================== GLOBAL VARIABLES ====================
    let products = [];
    let cart = [];
    let currentMemoNo = localStorage.getItem('lastMemoNo') ? parseInt(localStorage.getItem('lastMemoNo')) + 1 : 1;
    let currentDiscount = 0;
    let paymentMethod = 'cash';

    // ==================== TOAST NOTIFICATION ====================
    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast-notification toast-${type}`;
        toast.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle-fill' : type === 'error' ? 'exclamation-circle-fill' : 'info-circle-fill'} me-2"></i>${message}`;
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.style.animation = 'slideInRight 0.3s reverse';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // ==================== INITIALIZATION ====================
    async function init() {
        showToast('🔄 ডাটা লোড হচ্ছে...', 'info');
        await loadProducts();
        loadCategories();
        displayHeldCarts();
        setupKeyboardShortcuts();
        showToast('✅ POS সিস্টেম প্রস্তুত', 'success');
    }

    // ==================== LOAD PRODUCTS ====================
    async function loadProducts() {
        try {
            // Sample products for testing
            products = [
                { _id: '1', name: 'বাসমতি চাল', category: 'চাল', price: 120, costPrice: 100, stock: 50, barcode: '123456' },
                { _id: '2', name: 'মুসুর ডাল', category: 'ডাল', price: 85, costPrice: 70, stock: 30, barcode: '123457' },
                { _id: '3', name: 'সয়াবিন তেল', category: 'তেল', price: 160, costPrice: 140, stock: 20, barcode: '123458' },
                { _id: '4', name: 'নুন', category: 'মশলা', price: 35, costPrice: 25, stock: 100, barcode: '123459' },
                { _id: '5', name: 'চিনি', category: 'চিনি', price: 95, costPrice: 80, stock: 5, barcode: '123460' },
                { _id: '6', name: 'ডিম', category: 'দুগ্ধ', price: 12, costPrice: 10, stock: 200, barcode: '123461' }
            ];
            
            renderProducts();
        } catch (error) {
            showToast('❌ পণ্য লোড করতে সমস্যা হয়েছে', 'error');
        }
    }

    // ==================== RENDER PRODUCTS ====================
    function renderProducts(productList = products) {
        const list = document.getElementById('productList');
        list.innerHTML = '';
        
        productList.forEach(p => {
            const stockClass = p.stock > 20 ? 'stock-high' : p.stock > 10 ? 'stock-medium' : 'stock-low';
            const disabled = p.stock <= 0 ? 'disabled' : '';
            
            list.innerHTML += `
                <div class="col-6 col-lg-4">
                    <div class="product-card ${disabled}" onclick="addToCart('${p._id}')">
                        <span class="stock-badge ${stockClass}">📦 ${p.stock}</span>
                        <h6 class="mt-3 fw-bold">${p.name}</h6>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span class="text-primary fw-bold fs-5">${p.price}৳</span>
                            <small class="text-success">+${p.price - p.costPrice}৳</small>
                        </div>
                        ${p.barcode ? `<small class="text-muted">🔖 ${p.barcode}</small>` : ''}
                    </div>
                </div>
            `;
        });
    }

    // ==================== LOAD CATEGORIES ====================
    function loadCategories() {
        const categories = [...new Set(products.map(p => p.category).filter(Boolean))];
        const tabs = document.getElementById('categoryTabs');
        
        categories.forEach(cat => {
            tabs.innerHTML += `<div class="category-tab" onclick="filterCategory('${cat}')">${cat}</div>`;
        });
    }

    // ==================== FILTER CATEGORY ====================
    function filterCategory(category) {
        document.querySelectorAll('.category-tab').forEach(tab => tab.classList.remove('active'));
        event.target.classList.add('active');
        
        const filtered = category ? products.filter(p => p.category === category) : products;
        renderProducts(filtered);
    }

    // ==================== HANDLE SEARCH ====================
    function handleSearch() {
        const searchTerm = document.getElementById('search').value.toLowerCase();
        
        // Check barcode
        const barcodeMatch = products.find(p => p.barcode === searchTerm);
        if (barcodeMatch && searchTerm !== '') {
            addToCart(barcodeMatch._id);
            document.getElementById('search').value = '';
            document.getElementById('search').classList.add('scanner-active');
            setTimeout(() => document.getElementById('search').classList.remove('scanner-active'), 500);
            return;
        }
        
        // Filter by name
        const filtered = products.filter(p => 
            p.name.toLowerCase().includes(searchTerm) ||
            (p.category && p.category.toLowerCase().includes(searchTerm))
        );
        
        renderProducts(filtered);
    }

    // ==================== ADD TO CART ====================
    function addToCart(productId) {
        const product = products.find(p => p._id === productId);
        
        if (!product || product.stock <= 0) {
            showToast('❌ পণ্যটি স্টকে নেই!', 'error');
            return;
        }
        
        const existingItem = cart.find(i => i._id === productId);
        
        if (existingItem) {
            if (existingItem.qty >= product.stock) {
                showToast('⚠️ পর্যাপ্ত স্টক নেই!', 'warning');
                return;
            }
            existingItem.qty++;
        } else {
            cart.push({ ...product, qty: 1 });
        }
        
        updateCart();
        showToast(`✅ ${product.name} যোগ করা হয়েছে`, 'success');
    }

    // ==================== UPDATE CART ====================
    function updateCart() {
        const cartDiv = document.getElementById('cartItems');
        const cartCount = document.getElementById('cartCount');
        let subtotal = 0;
        
        cartDiv.innerHTML = '';
        
        cart.forEach(item => {
            const total = item.price * item.qty;
            subtotal += total;
            
            cartDiv.innerHTML += `
                <div class="cart-item">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h6 class="mb-1 fw-bold">${item.name}</h6>
                            <small class="text-muted">${item.price}৳ × ${item.qty}</small>
                        </div>
                        <div class="text-end">
                            <div class="fw-bold fs-5">${total}৳</div>
                            <div class="btn-group btn-group-sm mt-1">
                                <button class="btn btn-success" onclick="updateQuantity('${item._id}', ${item.qty + 1})">
                                    <i class="bi bi-plus"></i>
                                </button>
                                <button class="btn btn-warning" onclick="updateQuantity('${item._id}', ${item.qty - 1})">
                                    <i class="bi bi-dash"></i>
                                </button>
                                <button class="btn btn-danger" onclick="removeFromCart('${item._id}')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
        
        cartCount.innerText = cart.length;
        document.getElementById('subtotal').innerText = subtotal + '৳';
        updateTotal(subtotal);
    }

    // ==================== UPDATE QUANTITY ====================
    function updateQuantity(productId, newQty) {
        const item = cart.find(i => i._id === productId);
        const product = products.find(p => p._id === productId);
        
        if (newQty <= 0) {
            removeFromCart(productId);
            return;
        }
        
        if (newQty > product.stock) {
            showToast('⚠️ পর্যাপ্ত স্টক নেই!', 'warning');
            return;
        }
        
        item.qty = newQty;
        updateCart();
    }

    // ==================== REMOVE FROM CART ====================
    function removeFromCart(productId) {
        cart = cart.filter(i => i._id !== productId);
        updateCart();
        showToast('🗑️ পণ্য সরানো হয়েছে', 'info');
    }

    // ==================== CLEAR CART ====================
    function clearCart() {
        if (cart.length === 0) return;
        
        if (confirm('🔄 কার্ট খালি করতে চান?')) {
            cart = [];
            updateCart();
            showToast('🧹 কার্ট খালি করা হয়েছে', 'success');
        }
    }

    // ==================== APPLY DISCOUNT ====================
    function applyDiscount() {
        let discount = prompt('🎯 ডিসকাউন্ট পরিমাণ (%):', '0');
        discount = parseFloat(discount);
        
        if (!isNaN(discount) && discount >= 0 && discount <= 100) {
            currentDiscount = discount;
            document.getElementById('discountRow').style.display = 'flex';
            updateTotal(parseFloat(document.getElementById('subtotal').innerText));
            showToast(`💰 ${discount}% ডিসকাউন্ট প্রয়োগ করা হয়েছে`, 'success');
        }
    }

    // ==================== UPDATE TOTAL ====================
    function updateTotal(subtotal) {
        const discountAmount = (subtotal * currentDiscount) / 100;
        const total = subtotal - discountAmount;
        
        document.getElementById('discountAmount').innerText = discountAmount.toFixed(2) + '৳';
        document.getElementById('total').innerText = total.toFixed(2) + '৳';
        calculateChange();
    }

    // ==================== CALCULATE CHANGE ====================
    function calculateChange() {
        const total = parseFloat(document.getElementById('total').innerText) || 0;
        const paid = parseFloat(document.getElementById('paidAmount').value) || 0;
        const change = paid - total;
        
        document.getElementById('changeAmount').value = change >= 0 ? change.toFixed(2) + '৳' : '০.০০৳';
    }

    // ==================== SET PAYMENT METHOD ====================
    function setPaymentMethod(method) {
        paymentMethod = method;
        
        document.querySelectorAll('.payment-method').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('bkashFields').style.display = method === 'bkash' ? 'block' : 'none';
        document.getElementById('cardFields').style.display = method === 'card' ? 'block' : 'none';
    }

    // ==================== PROCESS PAYMENT ====================
    async function processPayment() {
        if (cart.length === 0) {
            showToast('❌ কার্ট খালি!', 'error');
            return;
        }
        
        const total = parseFloat(document.getElementById('total').innerText);
        const paid = parseFloat(document.getElementById('paidAmount').value) || 0;
        const customerName = document.getElementById('customerName').value || 'নগদ';
        const customerMobile = document.getElementById('customerMobile').value || 'N/A';
        const customerAddress = document.getElementById('customerAddress').value || 'N/A';
        
        if (paid < total) {
            if (!confirm(`⚠️ বাকি থাকবে: ${total - paid}৳। কি নিশ্চিত?`)) {
                return;
            }
        }
        
        try {
            showToast('🔄 প্রসেসিং...', 'info');
            
            // Update stock
            cart.forEach(item => {
                const product = products.find(p => p._id === item._id);
                if (product) product.stock -= item.qty;
            });
            
            // Reset cart
            cart = [];
            currentDiscount = 0;
            document.getElementById('discountRow').style.display = 'none';
            currentMemoNo++;
            localStorage.setItem('lastMemoNo', currentMemoNo);
            
            updateCart();
            renderProducts();
            showToast('✅ পেমেন্ট সফল হয়েছে!', 'success');
            
        } catch (error) {
            showToast('❌ পেমেন্ট প্রক্রিয়ায় সমস্যা হয়েছে', 'error');
        }
    }

    // ==================== HOLD CART ====================
    function holdCart() {
        if (cart.length === 0) {
            showToast('❌ কার্ট খালি!', 'error');
            return;
        }
        
        const heldCarts = JSON.parse(localStorage.getItem('heldCarts')) || [];
        
        heldCarts.push({
            id: Date.now(),
            cart: [...cart],
            customerName: document.getElementById('customerName').value || 'নাম নেই',
            customerMobile: document.getElementById('customerMobile').value || 'N/A',
            time: new Date().toLocaleString('bn-BD')
        });
        
        localStorage.setItem('heldCarts', JSON.stringify(heldCarts));
        
        // Clear cart
        cart = [];
        updateCart();
        
        // Update display
        displayHeldCarts();
        
        showToast('⏸️ কার্ট হোল্ড করা হয়েছে', 'success');
    }

    // ==================== DISPLAY HELD CARTS ====================
    function displayHeldCarts() {
        const heldCarts = JSON.parse(localStorage.getItem('heldCarts')) || [];
        const container = document.getElementById('heldCartsList');
        const countSpan = document.getElementById('heldCartCount');
        
        countSpan.innerText = heldCarts.length;
        
        if (heldCarts.length === 0) {
            container.innerHTML = '<p class="text-muted text-center p-3">📭 কোনো কার্ট হোল্ড করা নেই</p>';
            return;
        }
        
        let html = '';
        heldCarts.forEach((cart, index) => {
            const total = cart.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            html += `
                <div class="held-cart-item">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <strong>👤 ${cart.customerName}</strong>
                            <br>
                            <small class="text-muted">
                                📦 ${cart.cart.length} আইটেম | 💰 ${total}৳
                            </small>
                            <br>
                            <small class="text-info">⏱️ ${cart.time}</small>
                        </div>
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-success" onclick="loadHeldCart(${index})" title="লোড করুন">
                                <i class="bi bi-play-fill"></i>
                            </button>
                            <button class="btn btn-danger" onclick="deleteHeldCart(${index})" title="ডিলিট">
                                <i class="bi bi-trash-fill"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }

    // ==================== LOAD HELD CART ====================
    function loadHeldCart(index) {
        const heldCarts = JSON.parse(localStorage.getItem('heldCarts')) || [];
        const heldCart = heldCarts[index];
        
        if (!heldCart) return;
        
        if (cart.length > 0) {
            if (!confirm('⚠️ বর্তমান কার্ট খালি হয়ে যাবে। কি লোড করবেন?')) {
                return;
            }
        }
        
        cart = [...heldCart.cart];
        
        document.getElementById('customerName').value = heldCart.customerName || '';
        document.getElementById('customerMobile').value = heldCart.customerMobile || '';
        
        updateCart();
        
        // Remove from held carts
        heldCarts.splice(index, 1);
        localStorage.setItem('heldCarts', JSON.stringify(heldCarts));
        
        displayHeldCarts();
        
        showToast('✅ হোল্ড করা কার্ট লোড করা হয়েছে', 'success');
    }

    // ==================== DELETE HELD CART ====================
    function deleteHeldCart(index) {
        if (confirm('🗑️ এই হোল্ড করা কার্ট কি ডিলিট করবেন?')) {
            const heldCarts = JSON.parse(localStorage.getItem('heldCarts')) || [];
            heldCarts.splice(index, 1);
            localStorage.setItem('heldCarts', JSON.stringify(heldCarts));
            
            displayHeldCarts();
            showToast('🗑️ কার্ট ডিলিট করা হয়েছে', 'success');
        }
    }

    // ==================== CUSTOMER HISTORY ====================
    function checkCustomerHistory() {
        const mobile = document.getElementById('customerMobile').value;
        if (mobile.length === 11) {
            showToast('📜 ক্রয় ইতিহাস দেখুন', 'info');
        }
    }

    function closeHistory() {
        document.getElementById('customerHistory').classList.remove('open');
    }

    // ==================== CALCULATOR FUNCTIONS ====================
    let calcExpression = '';
    
    function calcInput(value) {
        const display = document.getElementById('calcDisplay');
        
        if (value === 'C') {
            calcExpression = '';
            display.innerText = '0';
        } else if (value === '=') {
            try {
                const result = eval(calcExpression);
                display.innerText = result;
                calcExpression = result.toString();
            } catch (e) {
                display.innerText = 'Error';
            }
        } else {
            calcExpression += value;
            display.innerText = calcExpression;
        }
    }

    // ==================== KEYBOARD SHORTCUTS ====================
    function setupKeyboardShortcuts() {
        document.addEventListener('keydown', (e) => {
            // F1 - Calculator
            if (e.key === 'F1') {
                e.preventDefault();
                document.getElementById('calculator').scrollIntoView({ behavior: 'smooth' });
            }
            
            // F2 - Payment
            if (e.key === 'F2') {
                e.preventDefault();
                processPayment();
            }
            
            // F3 - Clear Cart
            if (e.key === 'F3') {
                e.preventDefault();
                clearCart();
            }
            
            // F4 - Hold Cart
            if (e.key === 'F4') {
                e.preventDefault();
                holdCart();
            }
            
            // Ctrl+F - Focus Search
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                document.getElementById('search').focus();
            }
        });
    }

    // ==================== CLEAN OLD HELD CARTS ====================
    function cleanOldHeldCarts() {
        const heldCarts = JSON.parse(localStorage.getItem('heldCarts')) || [];
        const oneDayAgo = Date.now() - (24 * 60 * 60 * 1000);
        
        const filtered = heldCarts.filter(cart => {
            const cartTime = new Date(cart.time.split(' ').join(' ')).getTime();
            return cartTime > oneDayAgo;
        });
        
        if (filtered.length !== heldCarts.length) {
            localStorage.setItem('heldCarts', JSON.stringify(filtered));
            displayHeldCarts();
        }
    }

    // ==================== EVENT LISTENERS ====================
    document.getElementById('search').addEventListener('keyup', handleSearch);
    
    // Auto-clean old carts every hour
    setInterval(cleanOldHeldCarts, 60 * 60 * 1000);
    
    // Initialize on load
    window.onload = init;
</script>

</body>
