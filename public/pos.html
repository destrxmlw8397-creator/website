<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>POS - সেলস সিস্টেম</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media print { 
            .no-print { display: none; } 
            #inv { display: block !important; width: 100%; font-family: 'Arial', sans-serif; } 
            body { background: white; }
        }
        #inv { display: none; padding: 30px; border: 1px solid #eee; width: 400px; margin: auto; }
        .cart-item { border-bottom: 1px solid #eee; padding: 5px 0; }
        .qty-input { width: 60px; display: inline-block; }
    </style>
</head>
<body class="bg-light">
<div class="container py-4 no-print">
    <div class="row">
        <div class="col-md-7">
            <input type="text" id="search" class="form-control mb-3 p-3 border-primary" placeholder="বারকোড স্ক্যান করুন বা নাম লিখুন..." onkeyup="render()" autofocus>
            <div class="row" id="pList"></div>
        </div>
        <div class="col-md-5">
            <div class="card p-4 shadow">
                <h4>কার্ট</h4>
                <input type="text" id="cName" class="form-control mb-2" placeholder="কাস্টমারের নাম">
                <input type="text" id="cMobile" class="form-control mb-3" placeholder="মোবাইল নম্বর">
                <div id="cart" class="my-3"></div>
                <hr>
                <h5>মোট: <span id="total">0</span> ৳</h5>
                <input type="number" id="paid" class="form-control mb-2" placeholder="পেমেন্ট (টাকা)">
                <button class="btn btn-success w-100 mt-2 fw-bold" onclick="pay()">পেমেন্ট ও প্রিন্ট</button>
            </div>
        </div>
    </div>
</div>

<div id="inv">
    <div class="text-center">
        <h3>🚀 SuperShop ERP Pro</h3>
        <p>ক্যাশ মেমো</p>
    </div>
    <hr>
    <p>কাস্টমার: <span id="invCName"></span><br>মোবাইল: <span id="invCMobile"></span></p>
    <table class="table table-sm">
        <thead>
            <tr>
                <th>পণ্য</th>
                <th>পরিমাণ</th>
                <th class="text-end">মূল্য</th>
            </tr>
        </thead>
        <tbody id="invItems"></tbody>
    </table>
    <hr>
    <div class="text-end">
        <h5 id="invTotal"></h5>
        <p>পেইড: <span id="invPaid"></span><br>বাকি: <span id="invDue"></span></p>
    </div>
    <p class="text-center mt-4"><small>ধন্যবাদ, আবার আসবেন!</small></p>
</div>

<script>
    let products = [], cart = [];
    async function init() {
        const res = await fetch('/api/products');
        products = await res.json();
        render();
    }
    function render() {
        const s = document.getElementById('search').value.toLowerCase();
        const bMatch = products.find(p => p.barcode === s);
        if(bMatch) { add(bMatch._id); document.getElementById('search').value = ''; return; }

        const list = document.getElementById('pList'); list.innerHTML = '';
        products.filter(p => p.name.toLowerCase().includes(s)).forEach(p => {
            list.innerHTML += `<div class="col-4 mb-2"><div class="card p-2 text-center" onclick="add('${p._id}')" style="cursor:pointer"><h6>${p.name}</h6><small>${p.price}৳ (Stock: ${p.stock})</small></div></div>`;
        });
    }
    function add(id) {
        const p = products.find(i => i._id === id);
        if(p.stock <= 0) return alert("স্টক নেই!");
        const exists = cart.find(i => i._id === id);
        exists ? exists.qty++ : cart.push({...p, qty: 1});
        updateCart();
    }

    // পরিমাণ পরিবর্তন করার ফাংশন
    function updateQty(id, newQty) {
        const item = cart.find(i => i._id === id);
        if(item) {
            if(newQty > item.stock) {
                alert("স্টকের বেশি সম্ভব নয়!");
                item.qty = item.stock;
            } else if(newQty <= 0) {
                cart = cart.filter(i => i._id !== id);
            } else {
                item.qty = Number(newQty);
            }
            updateCart();
        }
    }

    function updateCart() {
        let t = 0; document.getElementById('cart').innerHTML = '';
        cart.forEach(i => { 
            t += i.price * i.qty; 
            document.getElementById('cart').innerHTML += `
                <div class="d-flex justify-content-between align-items-center mb-2 cart-item">
                    <span>${i.name}</span>
                    <div class="d-flex align-items-center">
                        <input type="number" class="form-control form-control-sm qty-input me-2" value="${i.qty}" onchange="updateQty('${i._id}', this.value)">
                        <span>${i.price*i.qty}৳</span>
                    </div>
                </div>`; 
        });
        document.getElementById('total').innerText = t;
    }

    async function pay() {
        const total = Number(document.getElementById('total').innerText);
        const paid = Number(document.getElementById('paid').value);
        const customer = { customerName: document.getElementById('cName').value || "নগদ", customerMobile: document.getElementById('cMobile').value || "N/A" };
        if(!cart.length) return;
        await fetch('/api/checkout', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({cart, ...customer, totalAmount: total, paidAmount: paid}) });
        
        // ইনভয়েস ডেটা সেট করা (টেবিল ফরম্যাটে)
        document.getElementById('invCName').innerText = customer.customerName;
        document.getElementById('invCMobile').innerText = customer.customerMobile;
        
        let invRows = '';
        cart.forEach(i => {
            invRows += `<tr><td>${i.name}</td><td>${i.qty}</td><td class="text-end">${i.price * i.qty}৳</td></tr>`;
        });
        document.getElementById('invItems').innerHTML = invRows;
        
        document.getElementById('invTotal').innerText = "Total: " + total + " ৳";
        document.getElementById('invPaid').innerText = paid + " ৳";
        document.getElementById('invDue').innerText = (total - paid) + " ৳";
        
        window.print(); 
        location.reload();
    }
    window.onload = init;
</script>
</body>
</html>
