<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>POS - অপ্টিমাইজড পিডিএফ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        .no-print { display: block; }
        #inv { 
            display: none; 
            padding: 20px; 
            width: 350px; 
            background: white;
            font-family: 'Arial', sans-serif;
            font-size: 14px;
        }
        .cart-item { border-bottom: 1px solid #eee; padding: 5px 0; }
        .qty-input { width: 60px; display: inline-block; }
    </style>
</head>
<body class="bg-light">
<div class="container py-4 no-print">
    <div class="row">
        <div class="col-md-7">
            <input type="text" id="search" class="form-control mb-3 p-3 border-primary" placeholder="বারকোড বা নাম লিখুন..." onkeyup="render()" autofocus autocomplete="off">
            <div class="row" id="pList"></div>
        </div>
        <div class="col-md-5">
            <div class="card p-4 shadow">
                <h4>কার্ট</h4>
                <input type="text" id="cName" class="form-control mb-2" placeholder="কাস্টমারের নাম" autocomplete="off">
                <input type="text" id="cMobile" class="form-control mb-3" placeholder="মোবাইল নম্বর" autocomplete="off">
                <div id="cart" class="my-3"></div>
                <hr>
                <h5>মোট: <span id="total">0</span> ৳</h5>
                <input type="number" id="paid" class="form-control mb-2" placeholder="পেমেন্ট (টাকা)" autocomplete="off">
                <button class="btn btn-success w-100 mt-2 fw-bold" onclick="pay()">পেমেন্ট ও হালকা পিডিএফ</button>
            </div>
        </div>
    </div>
</div>

<div id="inv">
    <div style="text-align: center;">
        <h3 style="margin: 0;">🚀 SuperShop ERP Pro</h3>
        <p style="margin: 5px 0;">ক্যাশ মেমো</p>
    </div>
    <hr>
    <div style="margin-bottom: 10px; font-size: 12px;">
        <strong>কাস্টমার:</strong> <span id="invCName"></span><br>
        <strong>মোবাইল:</strong> <span id="invCMobile"></span><br>
        <strong>তারিখ:</strong> <span id="invDate"></span>
    </div>
    <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
        <thead>
            <tr style="border-bottom: 1px solid #000;">
                <th style="text-align: left; padding: 5px;">পণ্য</th>
                <th style="text-align: center; padding: 5px;">Qty</th>
                <th style="text-align: right; padding: 5px;">মূল্য</th>
            </tr>
        </thead>
        <tbody id="invItems"></tbody>
    </table>
    <hr>
    <div style="text-align: right; font-size: 13px;">
        <h5 id="invTotalText" style="margin: 5px 0;"></h5>
        <p style="margin: 0;">পেইড: <span id="invPaid"></span></p>
        <p style="margin: 0; font-weight: bold;">বাকি: <span id="invDue"></span></p>
    </div>
    <p style="text-align: center; margin-top: 20px; font-size: 10px;">ধন্যবাদ, আবার আসবেন!</p>
</div>

<script>
    let products = [], cart = [];
    
    async function init() {
        const res = await fetch('/api/products');
        products = await res.json();
        render();
    }

    function render() {
        const s = document.getElementById('search').value.toLowerCase();
        const bMatch = products.find(p => p.barcode === s);
        if(bMatch && s !== "") { 
            add(bMatch._id); 
            document.getElementById('search').value = ''; 
            return; 
        }

        const list = document.getElementById('pList'); 
        list.innerHTML = '';
        products.filter(p => p.name.toLowerCase().includes(s)).forEach(p => {
            list.innerHTML += `
                <div class="col-4 mb-2">
                    <div class="card p-2 text-center" onclick="add('${p._id}')" style="cursor:pointer; height: 100%;">
                        <h6>${p.name}</h6>
                        <small class="text-primary">${p.price}৳</small>
                    </div>
                </div>`;
        });
    }

    function add(id) {
        const p = products.find(i => i._id === id);
        if(!p || p.stock <= 0) return alert("স্টক নেই!");
        const exists = cart.find(i => i._id === id);
        exists ? exists.qty++ : cart.push({...p, qty: 1});
        updateCart();
    }

    function updateQty(id, newQty) {
        const item = cart.find(i => i._id === id);
        if(item) {
            item.qty = Number(newQty) <= 0 ? 1 : Number(newQty);
            updateCart();
        }
    }

    function updateCart() {
        let t = 0; 
        document.getElementById('cart').innerHTML = '';
        cart.forEach(i => { 
            t += i.price * i.qty; 
            document.getElementById('cart').innerHTML += `
                <div class="d-flex justify-content-between align-items-center mb-2 cart-item">
                    <span>${i.name}</span>
                    <div>
                        <input type="number" class="form-control form-control-sm qty-input me-2" value="${i.qty}" onchange="updateQty('${i._id}', this.value)">
                        <span>${i.price*i.qty}৳</span>
                    </div>
                </div>`; 
        });
        document.getElementById('total').innerText = t;
    }

    async function pay() {
        const total = Number(document.getElementById('total').innerText);
        const paid = Number(document.getElementById('paid').value);
        const cName = document.getElementById('cName').value || "নগদ";
        const cMobile = document.getElementById('cMobile').value || "N/A";

        if(!cart.length) return alert("কার্ট খালি!");

        await fetch('/api/checkout', { 
            method:'POST', 
            headers:{'Content-Type':'application/json'}, 
            body:JSON.stringify({cart, customerName: cName, customerMobile: cMobile, totalAmount: total, paidAmount: paid}) 
        });

        document.getElementById('invCName').innerText = cName;
        document.getElementById('invCMobile').innerText = cMobile;
        document.getElementById('invDate').innerText = new Date().toLocaleDateString('bn-BD');
        
        let rows = '';
        cart.forEach(i => {
            rows += `<tr><td style="padding:5px;">${i.name}</td><td style="text-align:center;">${i.qty}</td><td style="text-align:right;">${i.price*i.qty}৳</td></tr>`;
        });
        document.getElementById('invItems').innerHTML = rows;
        document.getElementById('invTotalText').innerText = "Total: " + total + " ৳";
        document.getElementById('invPaid').innerText = paid + " ৳";
        document.getElementById('invDue').innerText = (total - paid) + " ৳";

        const element = document.getElementById('inv');
        element.style.display = 'block';

        // সাইজ কমানোর জন্য অপ্টিমাইজড কনফিগারেশন
        const opt = {
            margin:       5,
            filename:     `Memo.pdf`,
            image:        { type: 'jpeg', quality: 0.6 }, // কোয়ালিটি কমানো হয়েছে
            html2canvas:  { scale: 1.5 }, // স্কেল কমানো হয়েছে যাতে ফাইল হালকা হয়
            jsPDF:        { unit: 'mm', format: [80, 150], orientation: 'portrait' } // ছোট মেমো সাইজ
        };

        html2pdf().set(opt).from(element).save().then(() => {
            element.style.display = 'none';
            location.reload();
        });
    }

    window.onload = init;
</script>
</body>
</html>
