<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>POS - সেলস সিস্টেম</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media print { .no-print { display: none; } #inv { display: block !important; } }
        #inv { display: none; padding: 20px; border: 1px solid #000; }
    </style>
</head>
<body class="bg-light">
<div class="container py-4 no-print">
    <div class="row">
        <div class="col-md-7">
            <div class="card p-3 mb-3">
                <input type="text" id="search" class="form-control" placeholder="পণ্য খুঁজুন..." onkeyup="render()">
            </div>
            <div class="row" id="pList"></div>
        </div>
        <div class="col-md-5">
            <div class="card p-4">
                <h4>কার্ট</h4>
                <div id="cart" class="my-3"></div>
                <hr>
                <h5>মোট: <span id="total">0</span> ৳</h5>
                <button class="btn btn-success w-100 mt-3" onclick="pay()">পেমেন্ট ও প্রিন্ট</button>
            </div>
        </div>
    </div>
</div>

<div id="inv">
    <h2 class="text-center">ক্যাশ মেমো</h2>
    <div id="invItems"></div>
    <hr>
    <h3 class="text-end" id="invTotal"></h3>
</div>

<script>
    let products = [], cart = [];
    async function init() {
        const res = await fetch('/api/products');
        products = await res.json();
        render();
    }
    function render() {
        const s = document.getElementById('search').value.toLowerCase();
        const list = document.getElementById('pList');
        list.innerHTML = '';
        products.filter(p => p.name.toLowerCase().includes(s)).forEach(p => {
            list.innerHTML += `<div class="col-4 mb-2"><div class="card p-2 shadow-sm text-center" onclick="add('${p._id}')" style="cursor:pointer"><h6>${p.name}</h6><small>${p.price}৳ (Stock: ${p.stock})</small></div></div>`;
        });
    }
    function add(id) {
        const p = products.find(i => i._id === id);
        const exists = cart.find(i => i._id === id);
        if(p.stock <= 0) return alert("স্টক আউট!");
        exists ? exists.qty++ : cart.push({...p, qty: 1});
        updateCart();
    }
    function updateCart() {
        const div = document.getElementById('cart');
        let t = 0; div.innerHTML = '';
        cart.forEach((i, idx) => {
            t += i.price * i.qty;
            div.innerHTML += `<div class="d-flex justify-content-between"><span>${i.name} x ${i.qty}</span><span>${i.price*i.qty}৳</span></div>`;
        });
        document.getElementById('total').innerText = t;
    }
    async function pay() {
        if(!cart.length) return;
        await fetch('/api/checkout', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({cart}) });
        
        document.getElementById('invItems').innerHTML = document.getElementById('cart').innerHTML;
        document.getElementById('invTotal').innerText = "Total: " + document.getElementById('total').innerText + " ৳";
        window.print();
        location.reload();
    }
    window.onload = init;
</script>
</body>
</html>
