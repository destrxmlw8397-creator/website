<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সুপারশপ ইনভেন্টরি ম্যানেজমেন্ট</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 30px; }
        
        .form-section { display: flex; gap: 10px; flex-wrap: wrap; background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        .form-section input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; min-width: 150px; }
        .form-section button { background: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.3s; }
        .form-section button:hover { background: #218838; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #1a73e8; color: white; text-transform: uppercase; font-size: 14px; }
        tr:hover { background-color: #f1f1f1; }
        
        .delete-btn { background: #ff4757; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .delete-btn:hover { background: #ff1f36; }

        .loader { text-align: center; font-weight: bold; color: #666; display: none; }
        
        @media (max-width: 600px) {
            .form-section { flex-direction: column; }
            .form-section button { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🛒 সুপারশপ হিসাব খাতা</h1>

    <div class="form-section">
        <input type="text" id="name" placeholder="পণ্যের নাম (যেমন: চাল)">
        <input type="number" id="price" placeholder="মূল্য (টাকা)">
        <input type="number" id="stock" placeholder="পরিমাণ (টি/কেজি)">
        <button onclick="addProduct()">পণ্য যোগ করুন</button>
    </div>

    <div id="loader" class="loader">ডেটা লোড হচ্ছে...</div>

    <table>
        <thead>
            <tr>
                <th>পণ্যের নাম</th>
                <th>মূল্য</th>
                <th>স্টক</th>
                <th>অ্যাকশন</th>
            </tr>
        </thead>
        <tbody id="productBody">
            </tbody>
    </table>
</div>

<script>
    // Render এ হোস্ট করার পর API_URL পরিবর্তন করে আপনার Render লিঙ্কি দিন
    // যেমন: const API_URL = 'https://your-app-name.onrender.com/api/products';
    const API_URL = window.location.origin + '/api/products';

    // ১. ডাটাবেস থেকে সব প্রোডাক্ট লোড করা
    async function fetchProducts() {
        const loader = document.getElementById('loader');
        loader.style.display = 'block';
        try {
            const res = await fetch(API_URL);
            const products = await res.json();
            const tbody = document.getElementById('productBody');
            tbody.innerHTML = '';

            products.forEach(product => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${product.name}</strong></td>
                        <td>${product.price} ৳</td>
                        <td>${product.stock} টি</td>
                        <td>
                            <button class="delete-btn" onclick="deleteProduct('${product._id}')">মুছে ফেলুন</button>
                        </td>
                    </tr>
                `;
            });
        } catch (err) {
            console.error("ডেটা আনতে সমস্যা হয়েছে:", err);
        } finally {
            loader.style.display = 'none';
        }
    }

    // ২. নতুন প্রোডাক্ট যোগ করা
    async function addProduct() {
        const name = document.getElementById('name').value;
        const price = document.getElementById('price').value;
        const stock = document.getElementById('stock').value;

        if (!name || !price || !stock) {
            alert("অনুগ্রহ করে সব তথ্য দিন!");
            return;
        }

        const newProduct = { name, price, stock };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newProduct)
            });

            if (response.ok) {
                // ইনপুট বক্স পরিষ্কার করা
                document.getElementById('name').value = '';
                document.getElementById('price').value = '';
                document.getElementById('stock').value = '';
                fetchProducts(); // নতুন লিস্ট দেখানো
            }
        } catch (err) {
            alert("পণ্য যোগ করা সম্ভব হয়নি!");
        }
    }

    // ৩. প্রোডাক্ট ডিলিট করা
    async function deleteProduct(id) {
        if (confirm('আপনি কি নিশ্চিত যে পণ্যটি মুছে ফেলতে চান?')) {
            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    fetchProducts();
                }
            } catch (err) {
                alert("মুছে ফেলা সম্ভব হয়নি!");
            }
        }
    }

    // পেজ লোড হওয়ার সময় ডাটা নিয়ে আসা
    window.onload = fetchProducts;
</script>

</body>
</html>
